services:
  # ── Aplicação Flask ────────────────────────────────────────────────────────
  app:
    build: .
    container_name: psdb_app
    restart: unless-stopped
    env_file: .env
    environment:
      FLASK_ENV: ${FLASK_ENV:-production}
    volumes:
      - .:/app # hot-reload em dev; em produção use COPY no Dockerfile
    ports:
      - "14545:5000"
