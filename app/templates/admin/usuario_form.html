{% extends "base.html" %}
{% block title %}{{ 'Editar' if user else 'Novo' }} Usuário{% endblock %}
{% block page_title %}<i class="bi bi-person-gear me-2 text-primary"></i>{{ 'Editar' if user else 'Novo' }} Usuário{%
endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-lg-6">
        <div class="card">
            <div class="card-body">
                <form method="POST"
                    action="{{ url_for('admin.editar_usuario', id=user.id) if user else url_for('admin.novo_usuario') }}">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nome Completo *</label>
                        <input type="text" name="nome" class="form-control" required
                            value="{{ user.nome if user else '' }}">
                    </div>
                    {% if not user %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">E-mail *</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    {% else %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">E-mail</label>
                        <input type="text" class="form-control" value="{{ user.email }}" disabled>
                    </div>
                    {% endif %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Perfil *</label>
                        <select name="perfil" class="form-select">
                            <option value="eleitor" {% if user and user.perfil=='eleitor' %}selected{% endif %}>
                                Eleitor</option>
                            <option value="cabo_eleitoral" {% if user and user.perfil=='cabo_eleitoral' %}selected{%
                                endif %}>
                                Cabo Eleitoral</option>
                            <option value="lideranca" {% if user and user.perfil=='lideranca' %}selected{% endif %}>
                                Liderança</option>
                            <option value="gestor" {% if user and user.perfil=='gestor' %}selected{% endif %}>
                                Master/Gestor</option>
                        </select>
                    </div>
                    {% if user %}
                    <div class="mb-3">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" name="ativo" id="ativo" {% if user.ativo
                                %}checked{% endif %}>
                            <label class="form-check-label" for="ativo">Usuário ativo</label>
                        </div>
                    </div>
                    {% endif %}
                    <div class="mb-4">
                        <label class="form-label fw-semibold">{{ 'Nova Senha' if user else 'Senha *' }}</label>
                        <input type="password" name="senha" class="form-control" {% if not user %}required{% endif %}
                            placeholder="{{ 'Deixe em branco para não alterar' if user else 'Mínimo 6 caracteres' }}"
                            minlength="6">
                    </div>
                    <div class="d-flex gap-2 justify-content-end">
                        <a href="{{ url_for('admin.usuarios') }}" class="btn btn-light px-4">Cancelar</a>
                        <button type="submit" class="btn btn-psdb px-5">
                            <i class="bi bi-check-lg me-1"></i>{{ 'Salvar' if user else 'Criar Usuário' }}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
