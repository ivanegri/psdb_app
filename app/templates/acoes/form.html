{% extends "base.html" %}
{% block title %}Registrar Ação{% endblock %}
{% block page_title %}<i class="bi bi-clipboard-plus me-2 text-primary"></i>Registrar Ação{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-lg-7">
        <div class="card">
            <div class="card-body">
                <form method="POST" action="{{ url_for('acoes.nova') }}">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Tipo de Ação *</label>
                        <div class="row g-2">
                            {% for val, label in tipos %}
                            <div class="col-6 col-md-4">
                                <input type="radio" class="btn-check" name="tipo" id="tipo_{{ val }}" value="{{ val }}"
                                    {% if loop.first %}checked{% endif %}>
                                <label class="btn btn-outline-secondary w-100" for="tipo_{{ val }}"
                                    style="font-size:13px;">{{ label }}</label>
                            </div>
                            {% endfor %}
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Eleitor Relacionado</label>
                        <select name="eleitor_id" class="form-select">
                            <option value="">— Nenhum —</option>
                            {% for e in eleitores %}
                            <option value="{{ e.id }}">{{ e.nome }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Bairro (se aplicável)</label>
                        <select name="bairro_id" class="form-select">
                            <option value="">— Nenhum —</option>
                            {% for b in bairros %}
                            <option value="{{ b.id }}">{{ b.nome }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Descrição</label>
                        <textarea name="descricao" class="form-control" rows="3"
                            placeholder="O que foi feito?"></textarea>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Resultado / Observação</label>
                        <textarea name="resultado" class="form-control" rows="2"
                            placeholder="Qual foi o resultado desta ação?"></textarea>
                    </div>
                    <div class="d-flex gap-2 justify-content-end">
                        <a href="{{ url_for('acoes.index') }}" class="btn btn-light px-4">Cancelar</a>
                        <button type="submit" class="btn btn-psdb px-5">
                            <i class="bi bi-check-lg me-1"></i>Registrar Ação
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
